<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Георгий Созанов — Программист</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent1: #7c3aed;
      --accent2: #06b6d4;
      --bg: #05030e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #f1f5f9;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ── DESKTOP: split layout ── */
    .page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* ── LEFT: фото ── */
    .photo-panel {
      position: relative;
      overflow: hidden;
    }
    .photo-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .photo-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, transparent 55%, rgba(5,3,14,0.95) 100%),
        linear-gradient(to bottom, rgba(5,3,14,0.25) 0%, transparent 25%);
    }

    /* ── RIGHT: контент ── */
    .content-panel {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(32px, 6vw, 80px);
      position: relative;
      overflow: hidden;
    }
    .content-panel::before {
      content: '';
      position: absolute;
      top: -10%; left: -20%;
      width: 120%; height: 70%;
      background: radial-gradient(ellipse at 30% 40%, rgba(124,58,237,0.18) 0%, transparent 65%);
      pointer-events: none;
    }
    .content-panel::after {
      content: '';
      position: absolute;
      bottom: -10%; right: -20%;
      width: 80%; height: 60%;
      background: radial-gradient(ellipse at 70% 70%, rgba(6,182,212,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    .inner {
      position: relative;
      z-index: 1;
      max-width: 420px;
    }

    /* Бейдж профессии */
    .role {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(124,58,237,0.18);
      border: 1px solid rgba(167,139,250,0.3);
      color: #c4b5fd;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 99px;
      margin-bottom: 24px;
    }

    /* Имя */
    .name {
      font-size: clamp(36px, 4.5vw, 58px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
      background: linear-gradient(120deg, #ffffff 0%, #c4b5fd 45%, #67e8f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% auto;
      animation: shimmer 5s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* Декоративные полоски */
    .accent-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .accent-line span {
      display: block;
      height: 2px;
      border-radius: 99px;
    }
    .accent-line .bar1 { width: 40px; background: #7c3aed; }
    .accent-line .bar2 { width: 20px; background: #06b6d4; }
    .accent-line .bar3 { width: 8px;  background: rgba(255,255,255,0.2); }

    /* Описание */
    .bio {
      font-size: clamp(13px, 1.5vw, 15px);
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 340px;
    }

    /* Иконки соцсетей */
    .socials {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 13px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: all .25s cubic-bezier(.22,1,.36,1);
      position: relative;
      overflow: hidden;
    }
    .social-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .25s;
      border-radius: inherit;
    }
    .social-btn:hover {
      transform: translateY(-4px) scale(1.1);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .social-btn.tg::before   { background: linear-gradient(135deg,#1e88e5,#29b6f6); }
    .social-btn.gh::before   { background: linear-gradient(135deg,#3a3a3a,#777); }
    .social-btn.vk::before   { background: linear-gradient(135deg,#1565c0,#1e88e5); }
    .social-btn.mail::before { background: linear-gradient(135deg,#c62828,#ef5350); }
    .social-btn:hover::before { opacity: 1; }
    .social-btn svg { position: relative; z-index: 1; transition: transform .25s; }
    .social-btn:hover svg { transform: scale(1.15); }

    /* Кнопка */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 14px 32px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 50%, #0891b2 100%);
      background-size: 200% auto;
      box-shadow: 0 4px 28px rgba(124,58,237,0.5);
      transition: all .3s cubic-bezier(.22,1,.36,1);
      animation: btnGlow 3s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    @keyframes btnGlow {
      0%,100% { box-shadow: 0 4px 28px rgba(124,58,237,.5); }
      50%      { box-shadow: 0 4px 44px rgba(124,58,237,.8), 0 0 0 4px rgba(124,58,237,.1); }
    }
    .cta::after {
      content: '';
      position: absolute;
      top: -50%; left: -60%;
      width: 40%; height: 200%;
      background: rgba(255,255,255,0.13);
      transform: skewX(-20deg);
      transition: left .5s ease;
    }
    .cta:hover::after { left: 140%; }
    .cta:hover {
      transform: translateY(-2px);
      background-position: right center;
      box-shadow: 0 8px 40px rgba(124,58,237,.7);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .page {
        grid-template-columns: 1fr;
        grid-template-rows: 55vh auto;
      }
      .photo-panel { height: 55vh; }
      .photo-panel::after {
        background: linear-gradient(to bottom, transparent 45%, rgba(5,3,14,0.97) 100%);
      }
      .content-panel {
        padding: 32px 24px 48px;
        justify-content: flex-start;
      }
      .inner { max-width: 100%; }
      .name { font-size: clamp(32px, 9vw, 44px); }
      .bio { font-size: 14px; max-width: 100%; }
      .cta { width: 100%; justify-content: center; }
    }
  </style>
</head>
